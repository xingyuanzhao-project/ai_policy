# NER multi-agent pipeline configuration

chunking:
  chunk_size: 3000
  overlap: 300

storage:
  base_dir: data/ner_runs

runtime:
  request_timeout_seconds: 600
  max_retries: 3
  concurrency: 10
  max_bill_text_chars: 100000

agents:
  zero_shot_annotator:
    temperature: 0.0
    max_tokens: 1024
  eval_assembler:
    temperature: 0.0
    max_tokens: 16384
  granularity_refiner:
    temperature: 0.0
    max_tokens: 16384

